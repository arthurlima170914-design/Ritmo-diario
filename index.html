<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Ritmo Diário</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f3e8ff;
      color: #4c1d95;
    }

    header {
      text-align: center;
      padding: 20px;
    }

    h1 {
      margin: 0;
    }

    .slogan {
      font-size: 14px;
      opacity: 0.7;
    }

    .container {
      padding: 20px;
    }

    input {
      width: 70%;
      padding: 10px;
      border-radius: 10px;
      border: none;
    }

    button {
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: #7c3aed;
      color: white;
      margin-left: 5px;
    }

    .habit {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: white;
      padding: 10px;
      border-radius: 12px;
      margin-top: 10px;
    }

    .circle {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid #7c3aed;
      display: inline-block;
      cursor: pointer;
    }

    .checked {
      background: #7c3aed;
    }

    .progress-bar {
      height: 10px;
      background: #ddd;
      border-radius: 10px;
      margin: 15px 0;
    }

    .progress {
      height: 10px;
      background: #7c3aed;
      border-radius: 10px;
      width: 0%;
    }
  </style>
</head>

<body>

<header>
  <h1>Ritmo Diário</h1>
  <div class="slogan">1% melhor a cada dia</div>
</header>

<div class="container">

  <div class="progress-bar">
    <div class="progress" id="progress"></div>
  </div>

  <input id="input" placeholder="Novo hábito">
  <button onclick="addHabit()">+</button>

  <div id="list"></div>

</div>

<script>
let habits = JSON.parse(localStorage.getItem("habits")) || [];

function save() {
  localStorage.setItem("habits", JSON.stringify(habits));
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  let total = habits.length;
  let done = habits.filter(h => h.done).length;

  habits.forEach((h, i) => {
    list.innerHTML += `
      <div class="habit">
        <span>${h.name}</span>
        <div>
          <span onclick="toggle(${i})" class="circle ${h.done ? "checked" : ""}"></span>
          <button onclick="removeHabit(${i})">❌</button>
        </div>
      </div>
    `;
  });

  let percent = total ? (done / total) * 100 : 0;
  document.getElementById("progress").style.width = percent + "%";
}

function addHabit() {
  const input = document.getElementById("input");
  if (!input.value) return;

  habits.push({ name: input.value, done: false });
  input.value = "";
  save();
  render();
}

function toggle(i) {
  habits[i].done = !habits[i].done;
  save();
  render();
}

function removeHabit(i) {
  habits.splice(i, 1);
  save();
  render();
}

render();
</script>

</body>
</html>
